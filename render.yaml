services:
  - type: web
    name: tictactoe-server
    env: node
    region: frankfurt # Or your preferred region
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000 # Render's default port
